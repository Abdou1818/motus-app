server:
  port: 8084
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: score-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:db_scores}
    username: ${DB_USER:motus}
    password: ${DB_PASS:motus}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info