server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: player-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:db_players}
    username: ${DB_USER:motus}
    password: ${DB_PASS:motus}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

score:
  service:
    url: ${SCORE_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info