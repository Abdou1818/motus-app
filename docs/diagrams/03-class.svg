<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="660" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1b1f33">Diagramme de classes — entités du domaine</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#5d6480">Une couleur = un microservice. Les liens inter-services sont logiques (référence par identifiant, pas de clé étrangère physique).</text>

  <!-- Player (player-service) -->
  <g>
    <rect x="40" y="90" width="200" height="120" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="40" y="90" width="200" height="28" rx="8" fill="#8b5cf6"/>
    <rect x="40" y="104" width="200" height="14" fill="#8b5cf6"/>
    <text x="140" y="109" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Player</text>
    <text x="140" y="132" text-anchor="middle" font-size="10" fill="#8b5cf6" font-style="italic">player-service · db_players</text>
    <line x1="40" y1="140" x2="240" y2="140" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="52" y="158">+ id : Long «PK»</text>
      <text x="52" y="176">+ username : String «unique»</text>
      <text x="52" y="194">+ email : String «unique»</text>
      <text x="52" y="210" font-size="11" fill="#5d6480">+ createdAt : LocalDateTime</text>
    </g>
  </g>

  <!-- Game (game-service) -->
  <g>
    <rect x="380" y="90" width="230" height="230" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <rect x="380" y="90" width="230" height="28" rx="8" fill="#6366f1"/>
    <rect x="380" y="104" width="230" height="14" fill="#6366f1"/>
    <text x="495" y="109" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Game</text>
    <text x="495" y="132" text-anchor="middle" font-size="10" fill="#6366f1" font-style="italic">game-service · db_games</text>
    <line x1="380" y1="140" x2="610" y2="140" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="392" y="158">+ id : Long «PK»</text>
      <text x="392" y="176">+ playerId : Long</text>
      <text x="392" y="194">+ playerUsername : String</text>
      <text x="392" y="212">+ wordId : Long</text>
      <text x="392" y="230">+ secretWord : String</text>
      <text x="392" y="248">+ wordLength : int</text>
      <text x="392" y="266">+ maxAttempts : int = 6</text>
      <text x="392" y="284">+ attemptsUsed : int</text>
      <text x="392" y="302">+ status : GameStatus</text>
      <text x="392" y="318" font-size="11" fill="#5d6480">+ createdAt / finishedAt</text>
    </g>
  </g>

  <!-- enum GameStatus -->
  <g>
    <rect x="380" y="350" width="170" height="92" rx="8" fill="#fbfcff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="465" y="370" text-anchor="middle" font-size="11" fill="#6366f1" font-style="italic">«enumeration»</text>
    <text x="465" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1f33">GameStatus</text>
    <line x1="380" y1="396" x2="550" y2="396" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="392" y="414">IN_PROGRESS</text>
      <text x="392" y="432">WON · LOST</text>
    </g>
  </g>
  <line x1="465" y1="350" x2="465" y2="320" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Attempt (game-service) -->
  <g>
    <rect x="700" y="90" width="220" height="160" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <rect x="700" y="90" width="220" height="28" rx="8" fill="#6366f1"/>
    <rect x="700" y="104" width="220" height="14" fill="#6366f1"/>
    <text x="810" y="109" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Attempt</text>
    <text x="810" y="132" text-anchor="middle" font-size="10" fill="#6366f1" font-style="italic">game-service · db_games</text>
    <line x1="700" y1="140" x2="920" y2="140" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="712" y="158">+ id : Long «PK»</text>
      <text x="712" y="176">+ gameId : Long «FK»</text>
      <text x="712" y="194">+ attemptNumber : int</text>
      <text x="712" y="212">+ proposedWord : String</text>
      <text x="712" y="230">+ result : String (JSON)</text>
      <text x="712" y="246" font-size="11" fill="#5d6480">+ createdAt : LocalDateTime</text>
    </g>
  </g>

  <!-- Game 1..* Attempt (composition within same service/db) -->
  <line x1="610" y1="170" x2="700" y2="170" stroke="#6366f1" stroke-width="2"/>
  <polygon points="610,170 622,164 622,176" fill="#6366f1"/>
  <text x="628" y="162" font-size="11" fill="#5d6480">1</text>
  <text x="685" y="162" font-size="11" fill="#5d6480">0..*</text>
  <text x="655" y="186" font-size="11" fill="#1b1f33" text-anchor="middle">contient</text>

  <!-- Word (word-service) -->
  <g>
    <rect x="40" y="300" width="200" height="130" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="40" y="300" width="200" height="28" rx="8" fill="#10b981"/>
    <rect x="40" y="314" width="200" height="14" fill="#10b981"/>
    <text x="140" y="319" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Word</text>
    <text x="140" y="342" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">word-service · db_words</text>
    <line x1="40" y1="350" x2="240" y2="350" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="52" y="368">+ id : Long «PK»</text>
      <text x="52" y="386">+ value : String «unique»</text>
      <text x="52" y="404">+ length : int</text>
      <text x="52" y="422">+ difficulty : String</text>
    </g>
  </g>

  <!-- GameResult (score-service) -->
  <g>
    <rect x="380" y="480" width="240" height="160" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="380" y="480" width="240" height="28" rx="8" fill="#f59e0b"/>
    <rect x="380" y="494" width="240" height="14" fill="#f59e0b"/>
    <text x="500" y="499" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">GameResult</text>
    <text x="500" y="522" text-anchor="middle" font-size="10" fill="#b45309" font-style="italic">score-service · db_scores</text>
    <line x1="380" y1="530" x2="620" y2="530" stroke="#e6e9f5"/>
    <g font-size="12" fill="#1b1f33">
      <text x="392" y="548">+ id : Long «PK»</text>
      <text x="392" y="566">+ gameId : Long · playerId : Long</text>
      <text x="392" y="584">+ playerUsername : String</text>
      <text x="392" y="602">+ status : WON | LOST</text>
      <text x="392" y="620">+ attemptsUsed · wordLength : int</text>
      <text x="392" y="636" font-size="11" fill="#5d6480">+ playedAt : LocalDateTime</text>
    </g>
  </g>

  <!-- logical relations (dashed, cross-service) -->
  <g stroke="#a5abd6" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
    <!-- Player 1..* Game -->
    <path d="M240 165 C320 165, 340 200, 380 205"/>
    <!-- Game *..1 Word -->
    <path d="M380 250 C300 290, 250 320, 240 340"/>
    <!-- Game 1..1 GameResult -->
    <path d="M495 320 C495 400, 500 450, 500 480"/>
  </g>
  <g font-size="11" fill="#6f76a0" font-style="italic">
    <text x="300" y="180">joue ▸ playerId</text>
    <text x="250" y="300">utilise ▸ wordId</text>
    <text x="508" y="410">produit ▸ gameId</text>
  </g>

  <text x="480" y="654" text-anchor="middle" font-size="11" fill="#8b5cf6">— — — relation logique inter-service (couplage faible par identifiant)</text>
</svg>
