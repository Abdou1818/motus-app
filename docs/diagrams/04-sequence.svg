<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" font-family="Helvetica, Arial, sans-serif">
  <rect width="980" height="760" fill="#ffffff"/>
  <text x="490" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#1b1f33">Diagramme de séquence — déroulement d'une partie</text>

  <!-- Lifelines headers -->
  <g font-size="13" font-weight="700" fill="#fff" text-anchor="middle">
    <rect x="40" y="60" width="140" height="40" rx="9" fill="#6366f1"/><text x="110" y="85">Frontend (Joueur)</text>
    <rect x="240" y="60" width="120" height="40" rx="9" fill="#8b5cf6"/><text x="300" y="85">API Gateway</text>
    <rect x="430" y="60" width="120" height="40" rx="9" fill="#6366f1"/><text x="490" y="85">game-service</text>
    <rect x="620" y="60" width="120" height="40" rx="9" fill="#10b981"/><text x="680" y="85">word-service</text>
    <rect x="810" y="60" width="130" height="40" rx="9" fill="#f59e0b"/><text x="875" y="85">score-service</text>
  </g>
  <!-- Lifelines -->
  <g stroke="#c7cdec" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="110" y1="100" x2="110" y2="730"/>
    <line x1="300" y1="100" x2="300" y2="730"/>
    <line x1="490" y1="100" x2="490" y2="730"/>
    <line x1="680" y1="100" x2="680" y2="730"/>
    <line x1="875" y1="100" x2="875" y2="730"/>
  </g>

  <!-- FRAGMENT 1: start game -->
  <rect x="60" y="118" width="900" height="200" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="60" y="118" width="120" height="22" rx="4" fill="#6366f1"/>
  <text x="70" y="134" font-size="12" font-weight="700" fill="#fff">démarrer partie</text>

  <g font-size="12" fill="#1b1f33">
    <!-- front -> gateway -->
    <line x1="110" y1="160" x2="300" y2="160" stroke="#1b1f33" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="205" y="153" text-anchor="middle">POST /api/games {playerId, wordLength}</text>
    <!-- gateway -> game -->
    <line x1="300" y1="186" x2="490" y2="186" stroke="#1b1f33" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="395" y="179" text-anchor="middle">route → startGame()</text>
    <!-- game -> word -->
    <line x1="490" y1="212" x2="680" y2="212" stroke="#10b981" stroke-width="1.6" marker-end="url(#ag)"/>
    <text x="585" y="205" text-anchor="middle" fill="#059669">GET /words/random?length</text>
    <!-- word -> game return -->
    <line x1="680" y1="238" x2="490" y2="238" stroke="#10b981" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ag)"/>
    <text x="585" y="231" text-anchor="middle" fill="#059669">mot secret {id, value}</text>
    <!-- game self: persist -->
    <path d="M490 258 h46 v18 h-46" fill="none" stroke="#6366f1" stroke-width="1.4" marker-end="url(#ab)"/>
    <text x="545" y="263" font-size="11" fill="#6366f1">save(Game) · status=IN_PROGRESS</text>
    <!-- game -> front return -->
    <line x1="490" y1="300" x2="110" y2="300" stroke="#1b1f33" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="300" y="293" text-anchor="middle">{gameId, firstLetter, wordLength, maxAttempts}</text>
  </g>

  <!-- FRAGMENT 2: submit attempt -->
  <rect x="60" y="338" width="900" height="372" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="60" y="338" width="140" height="22" rx="4" fill="#f59e0b"/>
  <text x="70" y="354" font-size="12" font-weight="700" fill="#fff">proposer un mot</text>

  <g font-size="12" fill="#1b1f33">
    <!-- front -> gateway -->
    <line x1="110" y1="380" x2="300" y2="380" stroke="#1b1f33" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="205" y="373" text-anchor="middle">POST /api/games/{id}/attempts {word}</text>
    <!-- gateway -> game -->
    <line x1="300" y1="406" x2="490" y2="406" stroke="#1b1f33" stroke-width="1.6" marker-end="url(#a)"/>
    <text x="395" y="399" text-anchor="middle">route → submitAttempt()</text>
    <!-- game self checks -->
    <path d="M490 426 h64 v18 h-64" fill="none" stroke="#6366f1" stroke-width="1.4" marker-end="url(#ab)"/>
    <text x="562" y="431" font-size="11" fill="#6366f1">contrôle longueur + 1ʳᵉ lettre</text>
    <!-- game -> word validate -->
    <line x1="490" y1="466" x2="680" y2="466" stroke="#10b981" stroke-width="1.6" marker-end="url(#ag)"/>
    <text x="585" y="459" text-anchor="middle" fill="#059669">POST /words/validate {word}</text>
    <line x1="680" y1="492" x2="490" y2="492" stroke="#10b981" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ag)"/>
    <text x="585" y="485" text-anchor="middle" fill="#059669">existe ? true / false</text>
    <!-- game self evaluate -->
    <path d="M490 512 h64 v18 h-64" fill="none" stroke="#6366f1" stroke-width="1.4" marker-end="url(#ab)"/>
    <text x="562" y="517" font-size="11" fill="#6366f1">MotusAlgorithm.evaluate()</text>
    <path d="M490 546 h64 v18 h-64" fill="none" stroke="#6366f1" stroke-width="1.4" marker-end="url(#ab)"/>
    <text x="562" y="551" font-size="11" fill="#6366f1">save(Attempt) · maj attemptsUsed</text>

    <!-- alt fragment: game finished -->
    <rect x="430" y="582" width="510" height="86" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
    <rect x="430" y="582" width="60" height="20" rx="4" fill="#f59e0b"/>
    <text x="438" y="597" font-size="11" font-weight="700" fill="#fff">alt</text>
    <text x="498" y="597" font-size="11" fill="#b45309">[partie gagnée ou 6ᵉ essai atteint]</text>
    <line x1="490" y1="624" x2="875" y2="624" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#aa)"/>
    <text x="682" y="617" text-anchor="middle" fill="#b45309">POST /scores {gameId, status, attemptsUsed}</text>
    <text x="685" y="650" text-anchor="middle" font-size="11" fill="#5d6480">enregistre le résultat (WON / LOST)</text>

    <!-- game -> front final -->
    <line x1="490" y1="692" x2="110" y2="692" stroke="#1b1f33" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#a)"/>
    <text x="300" y="685" text-anchor="middle">{result[], gameStatus, remainingAttempts}</text>
  </g>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#1b1f33"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#10b981"/></marker>
    <marker id="aa" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#f59e0b"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#6366f1"/></marker>
  </defs>
</svg>
